name: Morning briefing preview

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD, empty means today in Asia/Shanghai"
        required: false
        type: string
      provider:
        description: "kimi, openai, qwen, or custom"
        required: false
        default: "qwen"
        type: choice
        options:
          - kimi
          - openai
          - qwen
          - custom
      model:
        description: "Optional model override"
        required: false
        default: "qwen3.7-max"
        type: string

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      MODEL_PROVIDER: ${{ github.event.inputs.provider || vars.MODEL_PROVIDER || 'qwen' }}
      MODEL_NAME: ${{ github.event.inputs.model || vars.MODEL_NAME || '' }}
      BRIEFING_DATE: ${{ github.event.inputs.date || '' }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL || '' }}
      KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.6' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.1' }}
      QWEN_MODEL: ${{ vars.QWEN_MODEL || 'qwen3.7-max' }}
      MAX_NEWS_CANDIDATES: ${{ vars.MAX_NEWS_CANDIDATES || '50' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Generate preview
        timeout-minutes: 12
        run: python scripts/generate_morning_briefing.py

      - name: Resolve preview date
        id: preview-date
        run: |
          DATE="${BRIEFING_DATE:-$(TZ=Asia/Shanghai date +%F)}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: morning-briefing-preview-${{ steps.preview-date.outputs.date }}
          path: |
            data/briefings.js
            assets/morning-briefing-${{ steps.preview-date.outputs.date }}.png
          if-no-files-found: error
