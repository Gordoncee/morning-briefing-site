name: Morning briefing

on:
  schedule:
    # 07:30, 07:45, 08:05, 08:20, and 08:35 Asia/Shanghai.
    # GitHub scheduled workflows can be delayed or occasionally dropped,
    # so backups are intentionally idempotent and skip when today's
    # briefing already exists.
    - cron: "30 23 * * *"
    - cron: "45 23 * * *"
    - cron: "5 0 * * *"
    - cron: "20 0 * * *"
    - cron: "35 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD, empty means today in Asia/Shanghai"
        required: false
        type: string
      provider:
        description: "kimi, openai, qwen, or custom"
        required: false
        default: "qwen"
        type: choice
        options:
          - kimi
          - openai
          - qwen
          - custom
      model:
        description: "Optional model override, e.g. qwen3.7-max"
        required: false
        default: "qwen3.7-max"
        type: string

permissions:
  contents: write

concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      MODEL_PROVIDER: ${{ github.event.inputs.provider || vars.MODEL_PROVIDER || 'kimi' }}
      MODEL_NAME: ${{ github.event.inputs.model || vars.MODEL_NAME || '' }}
      BRIEFING_DATE: ${{ github.event.inputs.date || '' }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL || '' }}
      KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.6' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.1' }}
      QWEN_MODEL: ${{ vars.QWEN_MODEL || 'qwen3.7-max' }}
      MAX_NEWS_CANDIDATES: ${{ vars.MAX_NEWS_CANDIDATES || '30' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip pillow

      - name: Resolve briefing date
        id: briefing-date
        run: |
          DATE="${BRIEFING_DATE:-$(TZ=Asia/Shanghai date +%F)}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Check existing scheduled briefing
        id: existing-briefing
        run: |
          DATE="${{ steps.briefing-date.outputs.date }}"
          if [ "${{ github.event_name }}" = "schedule" ] && grep -Eq "(date:|\"date\":)[[:space:]]*\"${DATE}\"" data/briefings.js; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled briefing ${DATE} already exists; skipping backup run."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing
        if: steps.existing-briefing.outputs.skip != 'true'
        timeout-minutes: 12
        run: python scripts/generate_morning_briefing.py

      - name: Validate generated files
        if: steps.existing-briefing.outputs.skip != 'true'
        run: |
          node --check app.js
          node --check data/briefings.js
          python - <<'PY'
          import json
          import subprocess
          import sys
          script = """
          global.window = {};
          require('./data/briefings.js');
          const first = window.MORNING_BRIEFINGS[0];
          console.log(JSON.stringify({date:first.date, image:first.image, items:first.items.length}));
          """
          result = subprocess.run(["node", "-e", script], check=True, capture_output=True, text=True)
          info = json.loads(result.stdout)
          if info["items"] < 3:
              raise SystemExit("latest briefing has too few items")
          from pathlib import Path
          if not Path(info["image"]).exists():
              raise SystemExit(f"missing image: {info['image']}")
          print(info)
          PY

      - name: Commit and push
        if: steps.existing-briefing.outputs.skip != 'true'
        run: |
          DATE="${{ steps.briefing-date.outputs.date }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/briefings.js assets
          if git diff --cached --quiet; then
            echo "No briefing changes to commit."
            exit 0
          fi
          git commit -m "Update morning briefing ${DATE}"
          git push origin main
